<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sixtyfour&display=swap">
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Form box styling to match your dark FNAF theme */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: white;
            margin: 0;
            padding: 0;  
            background-color: #1a1a1a; 
            background-image: linear-gradient(rgba(17, 17, 17, 0.6), rgba(17, 17, 17, 0.6)), url('https://i.pinimg.com/736x/c6/e8/59/c6e8593be42f400230081bc3e16d666b.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
         }
         header {
                background: rgba(0, 0, 0, 0.4);
                color: white;
                padding: 20px 0;
                border-radius: 50px;
            }
        .form-container {
            background: #111;
            border: 2px solid #8b0000;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
            text-align: left;
        }
        a{
            color: white;
        }

        h3 {
            font-family: 'Press Start 2P', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff0000;
        }

        p {
            font-size: 23px;
            font-family: 'Jersey 10', monospace;
            text-transform: uppercase;
        }

        ul {
            font-size: 20px;
            font-family: 'Sixtyfour', monospace;
        }

        .form-container h2 { text-align: center; color: white; margin-bottom: 20px;}
        .form-group { margin-bottom: 20px; }
        .form-group label { font-family: 'Jersey 10', monospace; font-size: 24px; color: white; }
        .form-group input { 
            width: 100%; padding: 10px; border: 1px solid #555; 
            background: #222; color: white; border-radius: 4px; 
            font-family: Arial, sans-serif; box-sizing: border-box;
        }
        .submit-btn {
            width: 100%; padding: 12px; background: #8b0000; color: white;
            border: none; border-radius: 4px; cursor: pointer; 
            font-family: 'Press Start 2P', monospace; font-size: 14px;
            margin-top: 10px; transition: 0.3s;
        }
        .submit-btn:hover { background: #ff0000; box-shadow: 0 0 10px red; }
        .sign-up {
            text-align: center;
            margin-top: 20px;
            color: #ffffff;
            text-decoration: none;
        }
        .sign-up a {
            color: #f31414;
            text-decoration: none;
            font-weight: bold;
        }
        .sign-up a:hover {
            text-decoration: underline;
        }
        footer {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 40px 0;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header_wrap">
                <div class="up_head">
                    <div class="img"><img class="logo" src="img/logo.png" alt="logo" /> </div>
                    <div class="h1"><h1>Freddy's Home</h1></div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h2>Log In</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required>
                        <span id="togglePassword" style="position: absolute; right: 10px; top: 10px; cursor: pointer;">👁️</span>
                    </div>
                </div>
                <button type="submit" class="submit-btn">ENTER</button>
                <p class="sign-up">don't have an account? <a href="signup.html">Sign Up</a></p>
            </form>
        </div>
    </main>
    <footer>
        <div class="container">
            <div class="footer_wrap">
                <div class="links">
                    <a href="https://www.instagram.com/ariel_grodsky/">
                        <div class="social">
                            <img src="img/insta.jpg" alt="insta" />
                        </div>
                    </a>
                    <a href="https://www.tiktok.com/en/">
                        <div class="social">
                            <img src="img/tiktok.png" alt="tiktok" />
                        </div>
                    </a>
                    <a href="https://www.youtube.com/@FuhNaff">
                        <div class="social">
                            <img src="img/youtube.png" alt="youtube" />
                        </div>
                    </a>
                </div>

                <div class="down_foot">
                    <div class="img_foot"><img class="logo" src="img/logo.png" alt="logo" /></div>
                    <div class="nav_foot">                      
                    </div>
                </div>                
                <p id="rights">© 2025 My Website. All rights reserved to ariel grodsky.</p>
            </div>
        </div>
    </footer>
    <script>
        // Password toggle
        const toggleBtn = document.getElementById('togglePassword');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            if (passInput.type === 'password') {
                passInput.type = 'text'; toggleBtn.textContent = '🙈';
            } else {
                passInput.type = 'password'; toggleBtn.textContent = '👁️';
            }
        });

        // Handle Login Submit
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://test-qq91.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.text();

                if (response.ok) {
                    alert("Welcome back!");
                    window.location.href = "home.html"; // Bounces them to main page!
                } else {
                    alert("Error: " + data);
                }
            } catch (err) {
                console.error(err);
                alert("Could not connect to the server.");
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Fazbear Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Jersey+20&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sixtyfour&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nosifer&display=swap">
    
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contact.css" />
</head>
<body>
    <header>
        <div class="container">
            <div class="header_wrap">
                <div class="up_head" style="position: relative;">
                    <div class="img"><img class="logo" src="img/logo.png" alt="logo" /> </div>
                    <div class="h1"><h1>Freddy's Home</h1></div>
                    
                    <div id="auth-section" class="login-box">
                        <a href="login.html" class="login-btn">Log In 👤</a>
                    </div>
                </div>
                <nav>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contacts.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div id="Form">
                <h2>INCIDENT REPORT FORM</h2>
                <form id="myForm">
                    <label for="username">Authorized Username:</label>
                    <input type="text" class="form_select" id="username" name="username" placeholder="Enter username..."><br>

                    <label for="email">Email Address:</label>
                    <input type="email" class="form_select" id="email" placeholder="email@domain.com"><br>

                    <div class="split-inputs">
                        <div class="half-input">
                            <label for="age">Age:</label>   
                            <input type="number" class="form_select" id="age" name="age" value="16" min="15" max="120">
                        </div>
                        <div class="half-input">
                            <label for="Tel">Phone:</label>
                            <input type="tel" class="form_select" id="Tel" name="Telephone" placeholder="05XXXXXXXX" pattern="[0-9]{10}">
                        </div>
                    </div><br>

                    <label for="Issue">Nature of the Incident:</label>
                    <select name="Issue" class="form_select" id="Issue">
                        <option value="">-- Select an issue --</option>
                        <option value="bugs">System Bugs</option>
                        <option value="technical">Technical Failure</option>
                        <option value="general question">Animatronic Behavior</option>
                    </select><br><br>

                    <label for="message">Detailed Incident Report:</label>
                    <textarea name="complaint" class="form_select" id="message" rows="8" placeholder="Please describe what you saw in detail..."></textarea><br>

                    <button type="button" id="submitBtn" onclick="validateForm()">SUBMIT REPORT</button>
                </form>
            </div>
            
            <div class="contact_us_box">
                <p class="contact_us">EMERGENCY CONTACT CHANNELS:</p>
                <a class="contact_info" href="mailto:groariel@gmail.com">► groariel@gmail.com</a>
                <a class="contact_info" href="tel:0542574433">► 0542574433</a>
            </div> 
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer_wrap">
                <div class="links">
                    <a href="https://www.instagram.com/ariel_grodsky/"><div class="social"><img src="img/insta.jpg" alt="insta" /></div></a>
                    <a href="https://www.tiktok.com/en/"><div class="social"><img src="img/tiktok.png" alt="tiktok" /></div></a>
                    <a href="https://www.youtube.com/@FuhNaff"><div class="social"><img src="img/youtube.png" alt="youtube" /></div></a>
                </div>

                <div class="down_foot">
                    <div class="img_foot"><img class="logo" src="img/logo.png" alt="logo" /></div>
                    <div class="nav_foot">
                        <nav>
                            <ul>
                                <li><a href="index.html">Home</a></li>
                                <li><a href="about.html">About</a></li>
                                <li><a href="contacts.html">Contact</a></li>
                            </ul>
                        </nav>                      
                    </div>
                </div>                
                <p id="rights">© 2025 Fazbear Entertainment. All rights reserved to Ariel Grodsky.</p>
            </div>
        </div>
    </footer>
    
    <script src="contact.js"></script>
    
    <script>
        window.onload = function() {
            const savedName = localStorage.getItem('userName');
            const authSection = document.getElementById('auth-section');

            if (savedName && authSection) {
                authSection.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">SYSTEM USER: ${savedName}</span>
                        <a href="#" onclick="logout()" class="logout-link">LOG OUT</a>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('userName');
            window.location.reload();
        }
    </script>
</body>
</html>
